version: 0.2

# AWS CodeBuild buildspec for Cloud Health Dashboard
# Builds and pushes Docker images to ECR, then deploys to EC2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws --version
      - REPOSITORY_URI_FRONTEND=$ECR_REGISTRY/$ECR_FRONTEND_REPO
      - REPOSITORY_URI_BACKEND=$ECR_REGISTRY/$ECR_BACKEND_REPO
      - REPOSITORY_URI_NGINX=$ECR_REGISTRY/$ECR_NGINX_REPO
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo "Building image with tag $IMAGE_TAG"

  build:
    commands:
      - echo "Building Docker images..."

      # Build Frontend
      - echo "Building frontend..."
      - cd frontend
      - docker build -t $REPOSITORY_URI_FRONTEND:latest .
      - docker tag $REPOSITORY_URI_FRONTEND:latest $REPOSITORY_URI_FRONTEND:$IMAGE_TAG
      - cd ..

      # Build Backend
      - echo "Building backend..."
      - cd backend
      - docker build -t $REPOSITORY_URI_BACKEND:latest .
      - docker tag $REPOSITORY_URI_BACKEND:latest $REPOSITORY_URI_BACKEND:$IMAGE_TAG
      - cd ..

      # Build Nginx
      - echo "Building nginx..."
      - docker build -f nginx/Dockerfile -t $REPOSITORY_URI_NGINX:latest ./nginx
      - docker tag $REPOSITORY_URI_NGINX:latest $REPOSITORY_URI_NGINX:$IMAGE_TAG

  post_build:
    commands:
      - echo "Pushing Docker images to ECR..."

      # Push Frontend
      - docker push $REPOSITORY_URI_FRONTEND:latest
      - docker push $REPOSITORY_URI_FRONTEND:$IMAGE_TAG

      # Push Backend
      - docker push $REPOSITORY_URI_BACKEND:latest
      - docker push $REPOSITORY_URI_BACKEND:$IMAGE_TAG

      # Push Nginx
      - docker push $REPOSITORY_URI_NGINX:latest
      - docker push $REPOSITORY_URI_NGINX:$IMAGE_TAG

      - echo "Build completed successfully"

artifacts:
  files:
    - docker-compose.yml
    - nginx/nginx.conf
    - scripts/deploy-ec2.sh

cache:
  paths:
    - '/root/.npm/**/*'
    - '/root/.cache/**/*'
